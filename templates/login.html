<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATM Portal – Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md">
        <!-- Brand Header -->
        <div class="text-center mb-10">
            <div
                class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-100">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.246 18.477 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-4xl font-bold text-slate-900 tracking-tight">SATM Portal</h1>
            <p class="text-slate-500 mt-2 font-medium">Smart Automated Timetabling Manager</p>
        </div>

        <!-- Login Card -->
        <div
            class="bg-white rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/50 p-10 overflow-hidden relative">
            <div class="absolute top-0 inset-x-0 h-1.5 bg-indigo-600"></div>

            {% if messages %}
            <div class="mb-8">
                {% for message in messages %}
                {% if forloop.last %}
                <div
                    class="px-4 py-3 rounded-xl flex items-center gap-3 text-xs font-bold uppercase tracking-widest {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-100{% else %}bg-emerald-50 text-emerald-600 border border-emerald-100{% endif %}">
                    {{ message }}
                </div>
                {% endif %}
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Academic
                        Username</label>
                    <input type="text" name="username" required autofocus
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-300 focus:outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all font-medium"
                        placeholder="e.g. ccs/00001/25">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Access
                        Password</label>
                    <input type="password" name="password" required
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 placeholder-slate-300 focus:outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all font-medium"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-100 transform active:scale-[0.98]">
                    Continue to Portal →
                </button>
            </form>
        </div>

        <p class="mt-8 text-center text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">
            &copy; 2026 Maseno University &bull; Computing Core
        </p>
    </div>
</body>

</html>
